changelog:
  exclude:
    authors:
      - github-actions[bot]
      - dependabot[bot]
      - github-copilot[bot]
      - codex[bot]
      - openai-codex[bot]
  categories:
    - title: Added
      labels: [feature, enhancement]
    - title: Changed
      labels: [change]
    - title: Fixed
      labels: [bug, fix]
    - title: Security
      labels: [security]
    - title: Documentation
      labels: [documentation, docs]
    - title: Dependencies
      labels: [dependencies]
    - title: Other Changes
      labels: ["*"]
